name: CI

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm ci
      - run: npm run test:vitest

  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        emscripten: [latest, 3.1.69]
    name: playwright (emscripten ${{ matrix.emscripten }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Set up Emscripten
        run: |
          wget https://github.com/emscripten-core/emsdk/archive/main.tar.gz
          tar -xf main.tar.gz
          emsdk-main/emsdk install ${{ matrix.emscripten }}
          emsdk-main/emsdk activate ${{ matrix.emscripten }}
          emsdk-main/emsdk construct_env > tmp
          source tmp
          for i in `sed -n 's/^export \(.*\)=.*$/\1/p' tmp`
          do
            echo $i"<<EOF" >> $GITHUB_ENV
            echo ${!i} >> $GITHUB_ENV
            echo EOF >> $GITHUB_ENV
          done
      - run: npm ci
      - run: npm run build
      - run: npm run build:tests
      - run: npx playwright install --with-deps
      - run: npx playwright test

  build:
    needs: [test, playwright]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set up Emscripten
        run: |
          wget https://github.com/emscripten-core/emsdk/archive/main.tar.gz
          tar -xf main.tar.gz
          emsdk-main/emsdk install latest
          emsdk-main/emsdk activate latest
          emsdk-main/emsdk construct_env > tmp
          source tmp
          for i in `sed -n 's/^export \(.*\)=.*$/\1/p' tmp`
          do
            echo $i"<<EOF" >> $GITHUB_ENV
            echo ${!i} >> $GITHUB_ENV
            echo EOF >> $GITHUB_ENV
          done

      - name: Cache downloaded sources
        uses: actions/cache@v4
        with:
          path: demo/build/downloads
          key: demo-downloads-${{ hashFiles('demo/build/build-*.sh') }}

      - name: Build xterm-pty
        run: |
          npm ci
          npm run build

      - name: Build demo programs
        working-directory: demo/build
        run: bash build-all.sh

      - name: Build demo site
        working-directory: demo
        run: |
          npm install
          npx vite build

      - name: Upload demo site
        uses: actions/upload-artifact@v4
        with:
          name: demo-dist
          path: demo/dist

  deploy:
    needs: build
    # Skip on PRs from forks because secrets are not available there.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: demo-dist
          path: demo/dist

      - name: Deploy to Netlify
        id: netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npx -y netlify-cli@latest deploy --dir=demo/dist --prod --json > deploy.json
          else
            npx -y netlify-cli@latest deploy --dir=demo/dist --json > deploy.json
          fi
          cat deploy.json
          url=$(jq -r '.deploy_url' deploy.json)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.netlify.outputs.url }}';
            const marker = '<!-- netlify-preview-url -->';
            const body = `${marker}\n🚀 Demo preview deployed for ${context.sha.slice(0, 7)}: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
